<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hanaro of Legends — Score Report</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#C89B3C; --gold-light:#F0E6B2; --gold-bright:#FFD700;
  --blue:#0AC8B9; --blue-dark:#0593A2;
  --purple:#7B2FBE; --red:#C62F2F;
  --darker:#060D1B; --card-bg:#0E1E3D; --card-border:#1E3A5F;
  --text-main:#C8AA6E; --text-sub:#A0B4CC;
  --silver:#A8A8B0; --bronze:#B87333;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--darker);color:var(--text-main);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:
  radial-gradient(1px 1px at 10% 20%,rgba(200,170,110,.4) 0%,transparent 100%),
  radial-gradient(1px 1px at 30% 70%,rgba(10,200,185,.3) 0%,transparent 100%),
  radial-gradient(1px 1px at 60% 15%,rgba(200,170,110,.5) 0%,transparent 100%),
  radial-gradient(2px 2px at 45% 40%,rgba(255,215,0,.2) 0%,transparent 100%);
  pointer-events:none;z-index:0;}
.container{max-width:1200px;margin:0 auto;padding:0 20px 60px;position:relative;z-index:1;}

/* HEADER */
.header{text-align:center;padding:40px 20px 36px;position:relative;}
.header::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:600px;height:3px;background:linear-gradient(90deg,transparent,var(--gold),var(--blue),var(--gold),transparent);}
.logo-wrap{margin-bottom:16px;min-height:60px;display:flex;align-items:center;justify-content:center;}
.logo-wrap img{height:80px;object-fit:contain;filter:drop-shadow(0 0 20px rgba(200,155,60,.5));}
.logo-fallback{font-family:'Black Han Sans',sans-serif;font-size:44px;color:var(--gold);text-shadow:0 0 30px rgba(200,155,60,.6);display:none;}
.season-badge{display:inline-block;font-family:'Black Han Sans',sans-serif;font-size:11px;letter-spacing:4px;color:var(--blue);border:1px solid var(--blue-dark);padding:4px 16px;border-radius:20px;margin-bottom:14px;background:rgba(10,200,185,.08);animation:pulse-blue 2s ease-in-out infinite;}
@keyframes pulse-blue{0%,100%{box-shadow:0 0 8px rgba(10,200,185,.3)}50%{box-shadow:0 0 20px rgba(10,200,185,.7)}}
.title-main{font-family:'Black Han Sans',sans-serif;font-size:clamp(32px,5vw,64px);color:var(--gold);text-shadow:0 0 30px rgba(200,155,60,.6),0 0 60px rgba(200,155,60,.3),2px 2px 0 rgba(0,0,0,.8);letter-spacing:2px;line-height:1;margin-bottom:8px;}
.title-sub{font-family:'Black Han Sans',sans-serif;font-size:clamp(14px,2vw,22px);color:var(--text-sub);letter-spacing:8px;text-transform:uppercase;margin-bottom:16px;}
.header-divider{width:300px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:16px auto;}
.header-info{font-size:12px;color:var(--text-sub);letter-spacing:2px;}

/* LOADING / ERROR */
.center-state{text-align:center;padding:80px 20px;}
.center-state .icon{font-size:52px;margin-bottom:16px;}
.spin{animation:spin 1.5s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg)}}
.center-state .msg{font-family:'Black Han Sans',sans-serif;font-size:16px;color:var(--text-sub);letter-spacing:3px;}
.center-state .sub{font-size:12px;color:var(--text-sub);margin-top:8px;opacity:.6;}

/* SUMMARY */
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:36px 0;}
@media(max-width:768px){.summary-grid{grid-template-columns:repeat(2,1fr);}}
.stat-card{background:linear-gradient(135deg,var(--card-bg),#0A1830);border:1px solid var(--card-border);border-radius:8px;padding:20px;text-align:center;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.stat-card:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(200,155,60,.2);}
.stat-number{font-family:'Black Han Sans',sans-serif;font-size:34px;color:var(--gold-bright);text-shadow:0 0 15px rgba(255,215,0,.4);}
.stat-label{font-size:11px;color:var(--text-sub);letter-spacing:2px;margin-top:4px;text-transform:uppercase;}

/* SECTION TITLE */
.section-title{font-family:'Black Han Sans',sans-serif;font-size:20px;color:var(--gold);letter-spacing:3px;margin:50px 0 20px;display:flex;align-items:center;gap:12px;}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--card-border),transparent);}

/* LEADERBOARD */
.leaderboard{display:flex;flex-direction:column;gap:10px;}
.lb-row{background:linear-gradient(135deg,var(--card-bg),#0A1830);border:1px solid var(--card-border);border-radius:10px;padding:12px 18px;display:grid;grid-template-columns:52px 52px 170px 1fr auto auto;align-items:center;gap:14px;transition:all .2s;position:relative;overflow:hidden;animation:fadeInUp .35s ease both;}
.lb-row:hover{border-color:var(--gold);box-shadow:0 0 20px rgba(200,155,60,.15);transform:translateX(4px);}
.lb-row.rank-1{border-color:var(--gold-bright);background:linear-gradient(135deg,#1A2910,#0E1E3D);box-shadow:0 0 30px rgba(255,215,0,.2);}
.lb-row.rank-1::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,215,0,.06),transparent);}
.lb-row.rank-2{border-color:var(--silver);box-shadow:0 0 15px rgba(168,168,176,.12);}
.lb-row.rank-3{border-color:var(--bronze);box-shadow:0 0 15px rgba(184,115,51,.12);}
.rank-badge{font-family:'Black Han Sans',sans-serif;font-size:22px;text-align:center;}
.rank-1 .rank-badge{color:var(--gold-bright);text-shadow:0 0 12px rgba(255,215,0,.7);}
.rank-2 .rank-badge{color:var(--silver);}
.rank-3 .rank-badge{color:var(--bronze);}
.lb-row:not(.rank-1):not(.rank-2):not(.rank-3) .rank-badge{color:var(--text-sub);font-size:15px;}
.player-photo{width:48px;height:48px;border-radius:50%;border:2px solid var(--card-border);overflow:hidden;background:#0A1428;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;position:relative;}
.rank-1 .player-photo{border-color:var(--gold-bright);box-shadow:0 0 10px rgba(255,215,0,.4);}
.rank-2 .player-photo{border-color:var(--silver);}
.rank-3 .player-photo{border-color:var(--bronze);}
.player-photo img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;border-radius:50%;}
.photo-placeholder{font-family:'Black Han Sans',sans-serif;font-size:13px;color:var(--text-sub);display:flex;align-items:center;justify-content:center;width:100%;height:100%;}
.photo-hover-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;opacity:0;transition:opacity .2s;pointer-events:none;}
.player-photo:hover .photo-hover-overlay{opacity:1;}
.player-callname{font-family:'Black Han Sans',sans-serif;font-size:19px;color:var(--text-main);}
.rank-1 .player-callname{color:var(--gold-bright);}
.player-realname{font-size:11px;color:var(--text-sub);margin-top:2px;}
.mission-bars{display:flex;gap:4px;align-items:center;flex-wrap:wrap;}
.mission-bar{height:22px;border-radius:3px;display:flex;align-items:center;font-size:10px;font-weight:700;letter-spacing:.5px;padding:0 7px;white-space:nowrap;}
.bar-team{background:rgba(10,200,185,.18);border:1px solid #0593A2;color:#0AC8B9;}
.bar-comm{background:rgba(123,47,190,.18);border:1px solid #7B2FBE;color:#B87FFF;}
.bar-private{background:rgba(230,126,34,.18);border:1px solid #D35400;color:#F39C12;}
.bar-model{background:rgba(231,76,60,.18);border:1px solid #C0392B;color:#FF6B6B;}
.score-bar-wrap{width:100px;}
.score-bar-bg{height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;}
.score-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--blue-dark),var(--gold));}
.total-score{font-family:'Black Han Sans',sans-serif;font-size:20px;color:var(--gold-bright);text-align:right;min-width:76px;}
.total-score span{font-size:11px;color:var(--text-sub);font-family:'Noto Sans KR',sans-serif;font-weight:400;}
@media(max-width:900px){.lb-row{grid-template-columns:44px 44px 120px 1fr auto;}.score-bar-wrap{display:none;}}
@media(max-width:600px){.lb-row{grid-template-columns:36px 40px 1fr auto;grid-template-rows:auto auto;}.mission-bars{grid-column:3/-1;}}

/* SEASON TABS */
.season-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.season-tab{font-family:'Black Han Sans',sans-serif;font-size:13px;letter-spacing:2px;padding:8px 18px;border-radius:6px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text-sub);cursor:pointer;transition:all .2s;}
.season-tab:hover{border-color:var(--gold);color:var(--gold);}
.season-tab.active{border-color:var(--gold-bright);background:rgba(255,215,0,.08);color:var(--gold-bright);box-shadow:0 0 15px rgba(255,215,0,.15);}

/* TIER */
.tier-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
@media(max-width:1000px){.tier-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:600px){.tier-grid{grid-template-columns:repeat(2,1fr);}}
.tier-card{background:linear-gradient(135deg,var(--card-bg),#0A1830);border:1px solid var(--card-border);border-radius:10px;padding:20px 14px;text-align:center;}
.tier-img-wrap{width:72px;height:72px;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;}
.tier-img-wrap img{width:100%;height:100%;object-fit:contain;}
.tier-img-fallback{font-size:44px;display:none;}
.tier-card-name{font-family:'Black Han Sans',sans-serif;font-size:14px;letter-spacing:2px;margin-bottom:3px;}
.tier-card-cond{font-size:10px;color:var(--text-sub);margin-bottom:6px;letter-spacing:1px;}
.tier-card-bonus{font-family:'Black Han Sans',sans-serif;font-size:24px;margin-bottom:14px;}
.tier-player-list{display:flex;flex-direction:column;gap:5px;}
.tier-player-item{font-size:12px;padding:5px 8px;border-radius:4px;display:flex;justify-content:space-between;align-items:center;gap:6px;}
.tier-player-score{font-family:'Black Han Sans',sans-serif;font-size:12px;flex-shrink:0;}
.t-master{border-color:rgba(155,89,182,.5);}.t-master .tier-card-name{color:#C39BD3;}.t-master .tier-card-bonus{color:#9B59B6;}.t-master .tier-player-item{background:rgba(155,89,182,.08);color:#C39BD3;}
.t-expert{border-color:rgba(231,76,60,.5);}.t-expert .tier-card-name{color:#F1948A;}.t-expert .tier-card-bonus{color:#E74C3C;}.t-expert .tier-player-item{background:rgba(231,76,60,.08);color:#F1948A;}
.t-proficiency{border-color:rgba(230,126,34,.5);}.t-proficiency .tier-card-name{color:#F0B27A;}.t-proficiency .tier-card-bonus{color:#E67E22;}.t-proficiency .tier-player-item{background:rgba(230,126,34,.08);color:#F0B27A;}
.t-growth{border-color:rgba(39,174,96,.5);}.t-growth .tier-card-name{color:#82E0AA;}.t-growth .tier-card-bonus{color:#27AE60;}.t-growth .tier-player-item{background:rgba(39,174,96,.08);color:#82E0AA;}
.t-foundation{border-color:rgba(160,180,204,.3);}.t-foundation .tier-card-name{color:var(--text-sub);}.t-foundation .tier-card-bonus{color:var(--text-sub);}.t-foundation .tier-player-item{background:rgba(160,180,204,.05);color:var(--text-sub);}

/* MISSION STATS */
.mstats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
@media(max-width:900px){.mstats-grid{grid-template-columns:1fr;}}
.mstats-card{background:linear-gradient(135deg,var(--card-bg),#0A1830);border:1px solid var(--card-border);border-radius:10px;padding:22px 24px;}
.mstats-title{font-family:'Black Han Sans',sans-serif;font-size:12px;letter-spacing:2px;color:var(--text-sub);margin-bottom:18px;text-transform:uppercase;}
.donut-wrap{display:flex;align-items:center;gap:20px;}
.donut-legend{display:flex;flex-direction:column;gap:10px;flex:1;}
.donut-legend-item{display:flex;align-items:center;gap:8px;}
.donut-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.donut-legend-label{color:var(--text-sub);flex:1;font-size:11px;}
.donut-legend-val{font-family:'Black Han Sans',sans-serif;font-size:13px;color:var(--text-main);}
.donut-legend-pct{font-size:10px;color:var(--text-sub);margin-left:2px;}
.hbar-list{display:flex;flex-direction:column;gap:13px;}
.hbar-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
.hbar-label{font-size:11px;color:var(--text-sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px;}
.hbar-val{font-family:'Black Han Sans',sans-serif;font-size:12px;color:var(--text-main);flex-shrink:0;}
.hbar-track{height:7px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden;}
.hbar-fill{height:100%;border-radius:4px;}
.top-list{display:flex;flex-direction:column;gap:8px;}
.top-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;background:rgba(255,255,255,.03);}
.top-rank{font-family:'Black Han Sans',sans-serif;font-size:12px;color:var(--text-sub);width:18px;text-align:center;flex-shrink:0;}
.top-photo{width:28px;height:28px;border-radius:50%;border:1px solid var(--card-border);overflow:hidden;background:#0A1428;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.top-photo img{width:100%;height:100%;object-fit:cover;}
.top-photo-ph{font-size:9px;color:var(--text-sub);}
.top-name{font-family:'Black Han Sans',sans-serif;font-size:13px;color:var(--text-main);flex:1;}
.top-score{font-family:'Black Han Sans',sans-serif;font-size:13px;color:var(--gold-bright);}
.top-bar-wrap{width:50px;}
.top-bar-bg{height:4px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;}
.top-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--blue-dark),var(--gold));}

/* MISSIONS */
.mission-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px;}
.mission-card{background:linear-gradient(135deg,var(--card-bg),#0A1830);border:1px solid var(--card-border);border-radius:8px;padding:18px;position:relative;overflow:hidden;}
.mission-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;}
.mission-card.team::before{background:#0AC8B9;}
.mission-card.comm::before{background:#9B59B6;}
.mission-card.priv::before{background:#E67E22;}
.mission-card.model::before{background:#E74C3C;}
.mission-type{font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.mission-card.team .mission-type{color:#0AC8B9;}
.mission-card.comm .mission-type{color:#B87FFF;}
.mission-card.priv .mission-type{color:#F39C12;}
.mission-card.model .mission-type{color:#FF6B6B;}
.mission-name{font-family:'Black Han Sans',sans-serif;font-size:16px;color:var(--text-main);margin-bottom:12px;}
.mission-participants{display:flex;flex-wrap:wrap;gap:6px;}
.participant-chip{font-size:11px;padding:3px 8px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--text-sub);}
.participant-chip.has-bonus{border-color:var(--gold);color:var(--gold-light);background:rgba(200,155,60,.1);}

/* FOOTER */
.footer{text-align:center;margin-top:60px;padding-top:30px;border-top:1px solid var(--card-border);font-size:11px;color:var(--text-sub);letter-spacing:2px;}

/* FLOATING FAB */
.upload-fab{position:fixed;bottom:32px;right:32px;z-index:100;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#0E1E3D,#0A1428);border:2px solid var(--card-border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;box-shadow:0 4px 20px rgba(0,0,0,.5);text-decoration:none;}
.upload-fab:hover{border-color:var(--gold);box-shadow:0 0 24px rgba(200,155,60,.4);transform:scale(1.1);}
.upload-fab:hover .fab-tooltip{opacity:1;transform:translateY(-50%) translateX(-8px);}
.fab-icon{font-size:22px;line-height:1;}
.fab-tooltip{position:absolute;right:calc(100% + 12px);top:50%;transform:translateY(-50%) translateX(0);background:var(--card-bg);border:1px solid var(--card-border);color:var(--text-main);font-size:12px;font-family:'Black Han Sans',sans-serif;letter-spacing:1px;padding:6px 12px;border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;transition:all .2s;}

@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important;}
</style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-wrap">
      <img src="images/logo.png" alt="HOL Logo"
           onerror="this.style.display='none';document.querySelector('.logo-fallback').style.display='block'">
      <div class="logo-fallback">HOL</div>
    </div>
    <div class="season-badge" id="headerBadge">HOL</div>
    <div class="title-main">Hanaro of Legends</div>
    <div class="title-sub">Summoner Score Report</div>
    <div class="header-divider"></div>
    <div class="header-info" id="headerInfo">데이터 불러오는 중...</div>
  </div>

  <!-- LOADING -->
  <div class="center-state" id="loadingState">
    <div class="icon spin">⚔️</div>
    <div class="msg">데이터 불러오는 중...</div>
  </div>

  <!-- ERROR -->
  <div class="center-state hidden" id="errorState">
    <div class="icon">⚠️</div>
    <div class="msg">데이터를 불러올 수 없습니다</div>
    <div class="sub">score/Hanaro_Scoring.json 파일을 확인해주세요</div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden">

    <div class="summary-grid">
      <div class="stat-card"><div class="stat-number" id="statPlayers">—</div><div class="stat-label">총 소환사</div></div>
      <div class="stat-card"><div class="stat-number" id="statMissions">—</div><div class="stat-label">완료 미션</div></div>
      <div class="stat-card"><div class="stat-number" id="statCerts">—</div><div class="stat-label">총 인증 수</div></div>
      <div class="stat-card"><div class="stat-number" id="statTotal">—</div><div class="stat-label">총 누적 점수</div></div>
    </div>

    <div class="section-title">⚔️ 소환사 랭킹</div>
    <div class="leaderboard" id="leaderboard"></div>

    <div class="section-title">🏆 시즌 티어</div>
    <div class="season-tabs" id="seasonTabs"></div>
    <div class="tier-grid" id="tierGrid"></div>

    <div class="section-title">📊 미션 통계</div>
    <div class="mstats-grid" id="mstatsGrid"></div>

    <div class="section-title">🛡️ 팀 통계</div>
    <div class="mstats-grid" id="teamStatsGrid"></div>

    <div class="section-title">📋 가장 최근 수행 미션</div>
    <div class="mission-grid" id="missionGrid"></div>

    <div class="footer">
      HANARO OF LEGENDS · 8기 <span id="footerDate"></span>
      <br><span style="color:var(--gold);margin-top:6px;display:block">⚡ 다음 미션에서 순위가 뒤집힐 수 있습니다 ⚡</span>
    </div>

  </div>
</div>

<!-- FAB: 새로고침 -->
<div class="upload-fab" id="refreshFab" onclick="loadData()" title="새로고침">
  <div class="fab-icon">🔄</div>
  <div class="fab-tooltip">데이터 새로고침</div>
</div>

<script>
const BASE_IMG  = 'images/';
const JSON_URL  = 'score/Hanaro_Scoring.json';

const TIER_DEFS = [
  {key:'master',      name:'MASTER',      img:'tier5.png', cond:'해당 주 상위 10% 이상', bonus:'+300pt', pct:90, cls:'t-master',      fb:'🏅'},
  {key:'expert',      name:'EXPERT',      img:'tier4.png', cond:'해당 주 상위 20% 이상', bonus:'+200pt', pct:80, cls:'t-expert',      fb:'🔴'},
  {key:'proficiency', name:'PROFICIENCY', img:'tier3.png', cond:'해당 주 상위 30% 이상', bonus:'+150pt', pct:70, cls:'t-proficiency', fb:'🤖'},
  {key:'growth',      name:'GROWTH',      img:'tier2.png', cond:'해당 주 상위 50% 이상', bonus:'+100pt', pct:50, cls:'t-growth',      fb:'📈'},
  {key:'foundation',  name:'FOUNDATION',  img:'tier1.png', cond:'해당 주 상위 50% 미만', bonus:'+50pt',  pct:0,  cls:'t-foundation',  fb:'🌱'},
];

// ── helpers ──
function detectCat(v){
  const s=String(v||'');
  if(s.includes('팀')) return 'team';
  if(s.includes('커뮤')) return 'comm';
  if(s.includes('프라이')) return 'priv';
  if(s.includes('모델')) return 'model';
  return 'etc';
}
function catLabel(c){return {team:'팀 액티브 미션',comm:'커뮤니케이션 미션',priv:'프라이빗 미션',model:'모델링 미션',etc:'기타'}[c]||c;}
function catBarCls(c){return {team:'bar-team',comm:'bar-comm',priv:'bar-private',model:'bar-model'}[c]||'bar-team';}
function catCardCls(c){return {team:'team',comm:'comm',priv:'priv',model:'model'}[c]||'team';}

// ── build state ──
function buildState(rows){
  const C = k => Object.keys(rows[0]||{}).find(x=>x.includes(k))||k;
  const CN=C('이름'), CC=C('콜네임'), CCAT=C('분류'), CM=C('미션명'),
        CS=C('획득점수'), CE=C('추가점수'), CSEA=C('시즌'), CDATE=C('일자');

  const seasons=[...new Set(rows.map(r=>String(r[CSEA]||'시즌1')))].sort();
  const bySeasonData={};
  seasons.forEach(s=>{ bySeasonData[s]=buildSeason(rows.filter(r=>String(r[CSEA]||'시즌1')===s),CN,CC,CCAT,CM,CS,CE); });
  const overall=buildSeason(rows,CN,CC,CCAT,CM,CS,CE);

  // 데이터에서 가장 마지막 인증 일자 추출 — 문자열 비교로 최댓값 선택
  let latestStr = '';
  rows.forEach(r=>{
    const raw = String(r[CDATE]||'').trim().slice(0,19);
    if(raw.length >= 10 && raw > latestStr) latestStr = raw;
  });
  let latestDate = null;
  if(latestStr){
    // Date 객체 변환 없이 문자열 직접 파싱 → 로컬 시간 그대로 사용
    const [datePart='', timePart='00:00'] = latestStr.split(' ');
    const [y,mo,dy] = datePart.split('-').map(Number);
    const [hh,mm] = timePart.split(':').map(Number);
    latestDate = { y, mo, dy, hh, mm };
  }

  return {
    seasons, bySeasonData, overall,
    totalPlayers: overall.ranking.length,
    totalMissions: overall.missions.length,
    totalCerts: rows.length,
    totalScore: overall.ranking.reduce((a,p)=>a+p.total,0),
    latestDate,
  };
}

function buildSeason(rows,CN,CC,CCAT,CM,CS,CE){
  const CT=Object.keys(rows[0]||{}).find(x=>x.includes('팀'))||'팀';
  const pm={};
  rows.forEach(r=>{
    const name=String(r[CN]||'').trim();
    const call=String(r[CC]||name).trim();
    const team=String(r[CT]||'').trim();
    const cat=detectCat(r[CCAT]);
    const mission=String(r[CM]||'').trim();
    const score=Number(r[CS]||0);
    const extra=Number(r[CE]||0);
    if(!name) return;
    if(!pm[name]) pm[name]={name,call,team,total:0,cats:{team:0,comm:0,priv:0,model:0},missions:{}};
    pm[name].call=call;
    pm[name].team=team;
    pm[name].total+=score;
    pm[name].cats[cat]=(pm[name].cats[cat]||0)+score;
    if(mission){
      if(!pm[name].missions[mission]) pm[name].missions[mission]={score:0,extra:0,cat};
      pm[name].missions[mission].score+=score;
      pm[name].missions[mission].extra+=extra;
    }
  });

  // Team total scores
  const teamScores={};
  const teamCatScores={};
  Object.values(pm).forEach(p=>{
    teamScores[p.team]=(teamScores[p.team]||0)+p.total;
    if(!teamCatScores[p.team]) teamCatScores[p.team]={team:0,comm:0,priv:0,model:0};
    Object.entries(p.cats).forEach(([c,v])=>{ if(teamCatScores[p.team][c]!==undefined) teamCatScores[p.team][c]+=v; });
  });

  const ranking=Object.values(pm).sort((a,b)=>b.total-a.total);
  const maxScore=ranking[0]?.total||1;
  const n=ranking.length;
  ranking.forEach((p,i)=>{
    const pct=n>1?(1-i/(n-1))*100:100;
    p.tier=(TIER_DEFS.find(t=>pct>=t.pct)||TIER_DEFS[TIER_DEFS.length-1]).key;
    p.barPct=Math.round((p.total/maxScore)*100);
  });

  const CDATE2 = Object.keys(rows[0]||{}).find(x=>x.includes('일자'))||'인증 일자';
  const mm={};
  rows.forEach(r=>{
    const mission=String(r[CM]||'').trim();
    const cat=detectCat(r[CCAT]);
    const call=String(r[CC]||r[CN]||'').trim();
    const extra=Number(r[CE]||0);
    const dateStr=String(r[CDATE2]||'').trim().slice(0,19);
    if(!mission) return;
    if(!mm[mission]) mm[mission]={mission,cat,participants:[],latestDate:''};
    mm[mission].participants.push({call,extra});
    if(dateStr > mm[mission].latestDate) mm[mission].latestDate = dateStr;
  });
  Object.values(mm).forEach(m=>{
    const seen={};
    m.participants=m.participants.filter(p=>seen[p.call]?false:(seen[p.call]=true));
  });

  // 가장 최근 수행 미션 순으로 정렬
  const missions = Object.values(mm).sort((a,b)=>b.latestDate.localeCompare(a.latestDate));

  return {ranking, missions, maxScore, teamScores, teamCatScores};
}

// ── photo store ──
const photoStore={};
function playerPhotoEl(callname){
  const safe=callname.replace(/[^a-zA-Z0-9가-힣]/g,'_');
  const gh=BASE_IMG+'player_'+encodeURIComponent(callname)+'.png';
  const stored=photoStore[callname];
  return `<div class="player-photo" data-call="${callname}" title="클릭해서 사진 변경" onclick="triggerPhoto('${safe}','${callname}')">
    <img src="${stored||gh}" alt="${callname}" ${stored?'':'onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"'} style="pointer-events:none">
    <div class="photo-placeholder" style="display:${stored?'none':'flex'};pointer-events:none">${callname.slice(0,3)}</div>
    <div class="photo-hover-overlay">📷</div>
    <input type="file" id="pi_${safe}" accept="image/*" style="display:none" onchange="onPhoto(event,'${callname}')">
  </div>`;
}
function triggerPhoto(safe){document.getElementById('pi_'+safe).click();}
function onPhoto(e,call){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    photoStore[call]=ev.target.result;
    document.querySelectorAll(`.player-photo[data-call="${call}"]`).forEach(el=>{
      el.querySelector('img').src=ev.target.result;
      el.querySelector('img').style.display='block';
      el.querySelector('.photo-placeholder').style.display='none';
    });
  };
  r.readAsDataURL(f);
}

// ── renderers ──
function renderLeaderboard(ranking){
  const icons=['👑','🥈','🥉'];
  return ranking.map((p,i)=>{
    const bars=Object.entries(p.cats).filter(([,v])=>v>0)
      .map(([c,v])=>`<div class="mission-bar ${catBarCls(c)}">${catLabel(c).replace(' 미션','')} ${v.toLocaleString()}</div>`).join('');
    return `<div class="lb-row ${i<3?'rank-'+(i+1):''}" style="animation-delay:${Math.min(i*.05,.4)}s">
      <div class="rank-badge">${i<3?icons[i]:i+1}</div>
      ${playerPhotoEl(p.call)}
      <div><div class="player-callname">${p.call}</div><div class="player-realname">${p.team||p.name}</div></div>
      <div class="mission-bars">${bars}</div>
      <div class="score-bar-wrap"><div class="score-bar-bg"><div class="score-bar-fill" style="width:${p.barPct}%"></div></div></div>
      <div class="total-score">${p.total.toLocaleString()} <span>pt</span></div>
    </div>`;
  }).join('');
}

function renderTier(ranking){
  return TIER_DEFS.map(td=>{
    const all=ranking.filter(p=>p.tier===td.key);
    const show=td.key==='foundation'?all.slice(0,4):all;
    const more=td.key==='foundation'&&all.length>4?`<div class="tier-player-item" style="justify-content:center;opacity:.5;font-size:11px">+ ${all.length-4}명 더</div>`:'';
    const rows=show.map(p=>`<div class="tier-player-item"><span>${p.call}</span><span class="tier-player-score">${p.total.toLocaleString()}</span></div>`).join('')
      ||`<div class="tier-player-item" style="justify-content:center;opacity:.4">해당 없음</div>`;
    return `<div class="tier-card ${td.cls}">
      <div class="tier-img-wrap">
        <img src="${BASE_IMG+td.img}" alt="${td.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <div class="tier-img-fallback" style="display:none">${td.fb}</div>
      </div>
      <div class="tier-card-name">${td.name}</div>
      <div class="tier-card-cond">${td.cond}</div>
      <div class="tier-card-bonus">${td.bonus}</div>
      <div class="tier-player-list">${rows}${more}</div>
    </div>`;
  }).join('');
}

function renderMissionStats(overall){
  const {ranking,missions}=overall;
  const catScore={team:0,comm:0,priv:0,model:0};
  ranking.forEach(p=>Object.entries(p.cats).forEach(([c,v])=>{if(catScore[c]!==undefined)catScore[c]+=v;}));
  const catTotal=Object.values(catScore).reduce((a,b)=>a+b,0)||1;
  const catDefs=[
    {key:'team',  label:'팀 액티브',    color:'#0AC8B9'},
    {key:'comm',  label:'커뮤니케이션', color:'#9B59B6'},
    {key:'priv',  label:'프라이빗',     color:'#E67E22'},
    {key:'model', label:'모델링',       color:'#E74C3C'},
  ];

  const R=52,cx=60,cy=60,stroke=14,circ=2*Math.PI*R;
  let offset=0,segs='';
  catDefs.forEach(cd=>{
    const dash=(catScore[cd.key]/catTotal)*circ;
    segs+=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${cd.color}" stroke-width="${stroke}" stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})" opacity=".85"/>`;
    offset+=dash;
  });
  const donut=`<svg width="120" height="120" viewBox="0 0 120 120" style="flex-shrink:0">
    <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="rgba(255,255,255,.04)" stroke-width="${stroke}"/>
    ${segs}
    <text x="${cx}" y="${cy-6}" text-anchor="middle" fill="#C8AA6E" font-family="Black Han Sans" font-size="13">${((catScore.team/catTotal)*100).toFixed(0)}%</text>
    <text x="${cx}" y="${cy+10}" text-anchor="middle" fill="#A0B4CC" font-family="Noto Sans KR" font-size="9">팀 미션</text>
  </svg>`;
  const legend=catDefs.map(cd=>`<div class="donut-legend-item">
    <div class="donut-dot" style="background:${cd.color}"></div>
    <div class="donut-legend-label">${cd.label}</div>
    <div class="donut-legend-val">${catScore[cd.key].toLocaleString()}<span class="donut-legend-pct">(${((catScore[cd.key]/catTotal)*100).toFixed(1)}%)</span></div>
  </div>`).join('');
  const card1=`<div class="mstats-card"><div class="mstats-title">카테고리별 획득 점수</div><div class="donut-wrap">${donut}<div class="donut-legend">${legend}</div></div></div>`;

  // card2: 팀 액티브 제외한 미션별 점수
  const mScores={};
  ranking.forEach(p=>Object.entries(p.missions||{}).forEach(([m,info])=>{
    if(info.cat==='team') return; // 팀 액티브 제외
    mScores[m]=(mScores[m]||0)+info.score;
  }));
  const mEntries=Object.entries(mScores).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const mMax=mEntries[0]?.[1]||1;
  const colorMap={team:'#0AC8B9',comm:'#9B59B6',priv:'#E67E22',model:'#E74C3C',etc:'#C89B3C'};
  const hbars=mEntries.map(([name,score])=>{
    const m=missions.find(r=>r.mission===name);
    const color=colorMap[m?.cat||'etc'];
    return `<div class="hbar-item"><div class="hbar-header"><div class="hbar-label">${name}</div><div class="hbar-val">${score.toLocaleString()}</div></div>
      <div class="hbar-track"><div class="hbar-fill" style="width:${Math.round(score/mMax*100)}%;background:${color}"></div></div></div>`;
  }).join('');
  const card2=`<div class="mstats-card"><div class="mstats-title">미션별 획득 점수 (팀 액티브 제외)</div><div class="hbar-list">${hbars||'<div style="color:var(--text-sub);font-size:12px">데이터 없음</div>'}</div></div>`;

  // card3: TOP5 소환사의 카테고리별 점수 시각화
  const top5=ranking.slice(0,5);
  const catColors={team:'#0AC8B9',comm:'#9B59B6',priv:'#E67E22',model:'#E74C3C'};
  const catLabels={team:'팀 액티브',comm:'커뮤니케이션',priv:'프라이빗',model:'모델링'};
  const allCatMax=Math.max(...top5.flatMap(p=>Object.values(p.cats)),1);
  const medals=['🥇','🥈','🥉','④','⑤'];

  const top5rows=top5.map((p,i)=>{
    const imgUrl=BASE_IMG+'player_'+encodeURIComponent(p.call)+'.png';
    const catBars=Object.entries(p.cats).filter(([,v])=>v>0).map(([c,v])=>`
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
        <div style="font-size:10px;color:${catColors[c]};width:70px;flex-shrink:0">${catLabels[c]||c}</div>
        <div style="flex:1;height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden">
          <div style="height:100%;width:${Math.round(v/allCatMax*100)}%;background:${catColors[c]};border-radius:3px"></div>
        </div>
        <div style="font-family:'Black Han Sans',sans-serif;font-size:11px;color:${catColors[c]};width:40px;text-align:right">${v.toLocaleString()}</div>
      </div>`).join('');
    return `<div style="display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05)">
      <div style="display:flex;align-items:center;gap:8px;width:110px;flex-shrink:0">
        <span style="font-size:14px">${medals[i]}</span>
        <div style="width:30px;height:30px;border-radius:50%;overflow:hidden;background:#0A1428;flex-shrink:0;position:relative">
          <img src="${imgUrl}" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">
        </div>
        <div style="font-family:'Black Han Sans',sans-serif;font-size:13px;color:var(--text-main)">${p.call}</div>
      </div>
      <div style="flex:1">${catBars}</div>
    </div>`;
  }).join('');

  const card3=`<div class="mstats-card"><div class="mstats-title">TOP 5 소환사 카테고리 분포</div>${top5rows}</div>`;

  return card1+card2+card3;
}

function renderTeamStats(overall){
  const {teamScores,teamCatScores}=overall;
  const catDefs=[
    {key:'team',  label:'팀 액티브',    color:'#0AC8B9'},
    {key:'comm',  label:'커뮤니케이션', color:'#9B59B6'},
    {key:'priv',  label:'프라이빗',     color:'#E67E22'},
    {key:'model', label:'모델링',       color:'#E74C3C'},
  ];
  // 팀명 색상: 카테고리 색상(청록/보라/주황/빨강)과 겹치지 않게 → 골드/민트그린/스카이블루/핑크 계열
  const teamColors=['#F1C40F','#2ECC71','#3498DB','#FF69B4','#A29BFE'];

  // Card 1: 팀별 총 획득 점수
  const teamEntries=Object.entries(teamScores||{}).sort((a,b)=>b[1]-a[1]);
  const teamMax=teamEntries[0]?.[1]||1;
  const teamBars=teamEntries.map(([tname,score],i)=>{
    const color=teamColors[i%teamColors.length];
    return `<div class="hbar-item">
      <div class="hbar-header"><div class="hbar-label" style="color:${color};font-weight:700">${tname}</div><div class="hbar-val">${score.toLocaleString()}</div></div>
      <div class="hbar-track"><div class="hbar-fill" style="width:${Math.round(score/teamMax*100)}%;background:${color}"></div></div>
    </div>`;
  }).join('');
  const card1=`<div class="mstats-card"><div class="mstats-title">팀별 총 획득 점수</div><div class="hbar-list">${teamBars}</div></div>`;

  // Card 2: 팀별 분류별 획득 점수
  const allCatMax=Math.max(...Object.values(teamCatScores||{}).flatMap(c=>Object.values(c)),1);
  const teamCatHtml=teamEntries.map(([tname],i)=>{
    const cats=(teamCatScores||{})[tname]||{team:0,comm:0,priv:0};
    const color=teamColors[i%teamColors.length];
    const catRows=catDefs.map(cd=>`<div class="hbar-item" style="margin-bottom:6px">
      <div class="hbar-header"><div class="hbar-label">${cd.label}</div><div class="hbar-val" style="color:${cd.color}">${(cats[cd.key]||0).toLocaleString()}</div></div>
      <div class="hbar-track"><div class="hbar-fill" style="width:${Math.round((cats[cd.key]||0)/allCatMax*100)}%;background:${cd.color}"></div></div>
    </div>`).join('');
    return `<div style="margin-bottom:20px">
      <div style="font-family:'Black Han Sans',sans-serif;font-size:13px;color:${color};margin-bottom:8px;letter-spacing:1px">${tname}</div>
      ${catRows}
    </div>`;
  }).join('');
  const card2=`<div class="mstats-card"><div class="mstats-title">팀별 분류별 획득 점수</div>${teamCatHtml}</div>`;

  return card1+card2;
}

function renderMissions(missions,totalPlayers){
  return missions.map(m=>{
    const allDone=m.participants.length===totalPlayers;
    const chips=allDone
      ?`<span class="participant-chip">${m.participants.length}명 전원 완료 · 기본점수</span>`
      :m.participants.map(p=>`<span class="participant-chip ${p.extra>0?'has-bonus':''}">${p.call}${p.extra>0?' +'+p.extra:''}</span>`).join('');
    // 날짜 파싱
    let dateLabel = '';
    if(m.latestDate){
      const [dp='',tp=''] = m.latestDate.split(' ');
      const [y,mo,dy] = dp.split('-').map(Number);
      const [hh=0,mm2=0] = tp.split(':').map(Number);
      const ampm = hh<12?'오전':'오후';
      const h12  = hh%12||12;
      dateLabel = `${y}. ${mo}. ${dy}. ${ampm} ${h12}시${mm2>0?' '+mm2+'분':''}`;
    }
    return `<div class="mission-card ${catCardCls(m.cat)}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <div class="mission-type" style="margin-bottom:0">${catLabel(m.cat)}</div>
        ${dateLabel?`<div style="font-size:10px;color:var(--text-sub);letter-spacing:.5px">${dateLabel}</div>`:''}
      </div>
      <div class="mission-name">${m.mission}</div>
      <div class="mission-participants">${chips}</div>
    </div>`;
  }).join('');
}

// ── main render ──
let state=null, activeSeason=null;

function render(){
  if(!state) return;
  let dateTime = '최종 업데이트 : 날짜 없음';
  if(state.latestDate){
    const {y,mo,dy,hh,mm} = state.latestDate;
    const ampm = hh < 12 ? '오전' : '오후';
    const h12  = hh % 12 || 12;
    const mStr = mm > 0 ? ` ${mm}분` : '';
    dateTime = `최종 업데이트 : ${y}. ${mo}. ${dy}. ${ampm} ${h12}시${mStr}`;
  }
  document.getElementById('headerBadge').textContent=activeSeason?`HOL · ${activeSeason}`:'HOL';
  document.getElementById('headerInfo').textContent=`${dateTime} · 총 ${state.totalPlayers}명의 소환사`;
  document.getElementById('footerDate').textContent=`· ${dateTime}`;
  document.getElementById('statPlayers').textContent=state.totalPlayers;
  document.getElementById('statMissions').textContent=state.totalMissions;
  document.getElementById('statCerts').textContent=state.totalCerts.toLocaleString();
  document.getElementById('statTotal').textContent=state.totalScore.toLocaleString();
  document.getElementById('leaderboard').innerHTML=renderLeaderboard(state.bySeasonData[activeSeason]?.ranking||state.overall.ranking);

  document.getElementById('seasonTabs').innerHTML=state.seasons.map(s=>
    `<div class="season-tab ${s===activeSeason?'active':''}" data-season="${s}">${s}</div>`).join('');
  document.querySelectorAll('.season-tab').forEach(t=>t.addEventListener('click',()=>{
    activeSeason=t.dataset.season;
    document.querySelectorAll('.season-tab').forEach(x=>x.classList.toggle('active',x===t));
    document.getElementById('tierGrid').innerHTML=renderTier(state.bySeasonData[activeSeason].ranking);
  }));
  document.getElementById('tierGrid').innerHTML=renderTier((state.bySeasonData[activeSeason]||state.overall).ranking);
  document.getElementById('mstatsGrid').innerHTML=renderMissionStats(state.overall);
  document.getElementById('teamStatsGrid').innerHTML=renderTeamStats(state.overall);
  document.getElementById('missionGrid').innerHTML=renderMissions(state.overall.missions,state.totalPlayers);
  document.getElementById('dashboard').classList.remove('hidden');
}

// ── load ──
async function loadData(){
  document.getElementById('loadingState').classList.remove('hidden');
  document.getElementById('errorState').classList.add('hidden');
  document.getElementById('dashboard').classList.add('hidden');
  try {
    const res=await fetch(JSON_URL+'?t='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    const rows=await res.json();
    state=buildState(rows);
    activeSeason=state.seasons[state.seasons.length-1]||null;
    render();
    document.getElementById('loadingState').classList.add('hidden');
  } catch(e){
    console.error(e);
    document.getElementById('loadingState').classList.add('hidden');
    document.getElementById('errorState').classList.remove('hidden');
  }
}
